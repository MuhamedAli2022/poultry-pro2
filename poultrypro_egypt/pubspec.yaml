name: poultrypro_egypt
description: "دليل الأمراض والتحصين المتكامل - A comprehensive poultry diseases and vaccination guide app"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_animate: ^4.2.0
  smooth_page_indicator: ^1.1.0
  font_awesome_flutter: ^10.7.0
  intl: ^0.18.0
  cached_network_image: ^3.3.1
  get: ^4.6.5
  shared_preferences: ^2.2.2
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  flutter_native_splash: ^2.3.5
  lottie: ^2.6.0
  glass: ^0.2.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

flutter_native_splash:
  color: "#0a0a1a"
  color_dark: "#0a0a1a"
  image: assets/images/splash.png
  android: true
  ios: false
